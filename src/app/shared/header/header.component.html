<header class="site-header">
    <div class="header-inner">
        <!-- Logo / Brand -->
        <a class="brand" routerLink="/" aria-label="Snapfolio home">
            Snapfolio
        </a>

        <!-- Desktop Navigation -->
        <nav class="desktop-nav" aria-label="Main navigation">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
            <a routerLink="/gallery" routerLinkActive="active">Gallery</a>
            <a routerLink="/about" routerLinkActive="active">About</a>
            <a routerLink="/contact" routerLinkActive="active">Contact</a>
        </nav>

        <!-- Hamburger Button -->
        <button class="hamburger" type="button" aria-label="Open navigation menu" [attr.aria-expanded]="menuOpen()"
            (click)="toggleMenu()">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </div>

    <!-- Mobile Overlay Navigation -->
    <div class="mobile-nav" [class.open]="menuOpen()" aria-hidden="{{ !menuOpen() }}">
        <nav aria-label="Mobile navigation">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
                (click)="closeMenu()">Home</a>
            <a routerLink="/gallery" routerLinkActive="active" (click)="closeMenu()">Gallery</a>
            <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
            <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
        </nav>
    </div>
</header>
